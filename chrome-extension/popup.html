<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>업무 도우미 설정</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
    width: 280px;
    background: #F5F7F5;
    color: #191F28;
  }

  .header {
    background: #00A86B;
    padding: 18px 18px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header h3 { font-size: 15px; font-weight: 700; color: #fff; }
  .header p  { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }

  .body { padding: 16px; }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }

  label { font-size: 12px; color: #8B95A1; display: block; margin-bottom: 6px; font-weight: 500; }

  input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #E4EDE8;
    border-radius: 10px;
    font-size: 13px;
    outline: none;
    color: #191F28;
    background: #F5F7F5;
  }
  input:focus { border-color: #00A86B; background: #fff; }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    background: #00A86B;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #009960; }

  .status {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
  }
  .ok  { color: #00A86B; }
  .err { color: #E53E3E; }

  .footer {
    padding: 10px 16px 14px;
    font-size: 11px;
    color: #8B95A1;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="icon">🌿</div>
  <div>
    <h3>업무 도우미</h3>
    <p>울산대학교 총무인사팀</p>
  </div>
</div>

<div class="body">
  <div class="card">
    <label>Anthropic API 키</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <button id="save">저장</button>
    <p class="status" id="status"></p>
  </div>
</div>

<div class="footer">
  API 키는 이 기기에만 저장됩니다.<br>
  외부로 전송되지 않습니다.
</div>

<script src="popup.js"></script>
</body>
</html>
