<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>업무 도우미 설정</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
    width: 300px;
    padding: 18px;
    background: #F5F7F5;
    color: #191F28;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .icon {
    width: 38px; height: 38px;
    background: #00A86B;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  h3 { font-size: 15px; font-weight: 700; }
  .sub { font-size: 11px; color: #8B95A1; margin-top: 2px; }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    color: #8B95A1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }
  .phase-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    margin-left: 6px;
    font-weight: 600;
    vertical-align: middle;
  }
  .phase1 { background: #E8F8F2; color: #00A86B; }
  .phase2 { background: #FFF3E0; color: #E65100; }

  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: #8B95A1; display: block; margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 8px 11px;
    border: 1.5px solid #E4EDE8;
    border-radius: 10px;
    font-size: 13px;
    outline: none;
    background: #F5F7F5;
    color: #191F28;
  }
  input:focus { border-color: #00A86B; background: #fff; }
  input::placeholder { color: #BCC5C0; }

  .hint { font-size: 11px; color: #8B95A1; margin-top: 4px; line-height: 1.5; }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: #00A86B;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #009960; }

  .status {
    font-size: 12px;
    margin-top: 8px;
    text-align: center;
    min-height: 16px;
  }
  .ok  { color: #00A86B; }
  .err { color: #E53E3E; }

  .mode-indicator {
    font-size: 11px;
    text-align: center;
    padding: 6px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .mode-direct { background: #E8F8F2; color: #2E7D52; }
  .mode-server { background: #FFF3E0; color: #BF6000; }
</style>
</head>
<body>

<div class="header">
  <div class="icon">🌿</div>
  <div>
    <h3>업무 도우미 설정</h3>
    <div class="sub">울산대학교 총무인사팀</div>
  </div>
</div>

<div class="mode-indicator" id="modeIndicator">현재 모드 확인 중...</div>

<!-- Phase 1: 직접 연결 -->
<div class="card">
  <div class="card-title">API 설정 <span class="phase-badge phase1">Phase 1</span></div>
  <div class="field">
    <label>Anthropic API 키</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
  </div>
</div>

<!-- 개인 정보 -->
<div class="card">
  <div class="card-title">내 정보</div>
  <div class="field">
    <label>사번 (선택)</label>
    <input type="text" id="employeeId" placeholder="예: 202401001">
    <div class="hint">입력하면 부서·예산 등 개인화된 답변을 받을 수 있습니다</div>
  </div>
</div>

<!-- Phase 2: 내부 서버 -->
<div class="card">
  <div class="card-title">내부 서버 <span class="phase-badge phase2">Phase 2 · DB 연동용</span></div>
  <div class="field">
    <label>서버 URL (선택)</label>
    <input type="text" id="serverUrl" placeholder="http://192.168.x.x:8000">
    <div class="hint">입력 시 내부 서버를 통해 DB 개인화 정보가 연동됩니다.<br>비워두면 Anthropic API를 직접 사용합니다.</div>
  </div>
</div>

<button id="save">저장</button>
<p class="status" id="status"></p>

<script src="popup.js"></script>
</body>
</html>
